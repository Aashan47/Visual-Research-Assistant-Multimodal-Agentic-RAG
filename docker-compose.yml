services:
  ollama:
    image: ollama/ollama:latest
    container_name: vra-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=10m
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    # Uncomment for NVIDIA GPU passthrough:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  model-puller:
    image: ollama/ollama:latest
    container_name: vra-model-puller
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "for m in qwen2.5vl:7b llama3.1:8b nomic-embed-text; do
         ollama list | grep -q \"$$m\" || ollama pull \"$$m\";
       done"
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vra-app
    depends_on:
      ollama:
        condition: service_healthy
      model-puller:
        condition: service_completed_successfully
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-false}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-visual-research-assistant}
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs

volumes:
  ollama-models:
  app-data:
  app-logs:
